# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Create directories
        run: mkdir -p data models logs
      
      - name: Create dummy .env
        run: |
          echo "GROQ_API_KEY=dummy" >> .env
          echo "GOOGLE_API_KEY=dummy" >> .env
      
      - name: Run unit tests
        run: |
          pytest tests/test_day1.py \
                 tests/test_day5.py \
                 tests/test_verifier_escalation.py \
                 -v --tb=short
        env:
          GROQ_API_KEY: dummy
          GOOGLE_API_KEY: dummy
      
      - name: Train classifier for golden prompts
        run: python -m src.classifier.train
        env:
          GROQ_API_KEY: dummy
          GOOGLE_API_KEY: dummy
      
      - name: Run golden prompts regression gate
        run: python tests/test_golden_local.py
        env:
          GROQ_API_KEY: dummy
          GOOGLE_API_KEY: dummy